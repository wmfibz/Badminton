name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: We'd love to hear your ideas!
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve or what would it enable?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Prompt engineering
        - New domain mode
        - Post-processing
        - MCP tools
        - Documentation
        - Other
