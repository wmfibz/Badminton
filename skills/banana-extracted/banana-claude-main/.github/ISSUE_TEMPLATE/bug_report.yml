name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill out the details below.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `/banana generate "..."`
        2. See error...
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Gemini model
      description: Which model were you using?
      placeholder: "gemini-3.1-flash-image-preview"
  - type: textarea
    id: logs
    attributes:
      label: Error output
      description: Paste any error messages or logs
      render: shell
